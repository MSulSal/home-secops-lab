name: Lab Exercise
description: Track work for a lab implementation or validation run.
title: "[Lab]: "
labels: ["lab"]
body:
  - type: input
    id: lab_id
    attributes:
      label: Lab ID
      description: Example: lab04-zeek-analysis
      placeholder: lab00-example
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be achieved in this lab run?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete pass/fail checks.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence Artifacts
      description: Dashboards, logs, and screenshots to capture.
