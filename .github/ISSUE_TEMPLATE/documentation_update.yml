name: Documentation Update
description: Propose updates to architecture, lab, or operational docs.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files and sections should be updated?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why this update is needed.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of Done
      description: What makes this documentation update complete?
