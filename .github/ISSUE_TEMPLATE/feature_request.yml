name: Feature Request
description: Propose a new monitoring, detection, or engineering capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What gap does this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe design approach and expected behavior.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks and Tradeoffs
      description: Security, operational, or complexity tradeoffs.
